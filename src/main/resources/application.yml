# 应用服务 WEB 访问端口
server:
  port: 8443
  ssl:
    enabled: true
    key-store: classpath:cert/localhost+2.p12
    key-store-password: ${SSL_PASSWORD}
    key-store-type: PKCS12
    key-alias: 1
    protocol: TLS
    #接入智谱ai
zhipu:
  ai:
    api-key: ${ZHIPU_API_KEY}
spring:
  datasource:
    url: "jdbc:mysql://localhost:3306/blueprint_nexus_wms?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai"
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver



    # Redis 配置
  data:
    redis:
      host: localhost
      port: 6379
      password: ${REDIS_PASSWORD}
      database: 1
      timeout: 2000ms # Redis操作超时（覆盖连接+命令），之前200ms太短导致频繁超时 走降级逻辑
      lettuce:
        # 连接池配置
        pool:
          max-active: 32        # 最大连接数
          max-idle: 16          # 最大空闲连接
          min-idle: 8           # 最小空闲连接
          max-wait: 1000ms      # 从连接池获取连接的超时时间
        shutdown-timeout: 200ms # 客户端关闭超时

mybatis-plus:
  # mapper XML 文件扫描路径
  mapper-locations: classpath:/mapper/**/*.xml

  # 实体类包路径（可选）
  # 作用：开启resultType类型别名后，在 XML 中可以简写类名
  # 例如：com.xxx.entity.User → 直接写 User
  type-aliases-package: com.melioes.blueprintdigitalnexus.entity
  global-config:
    db-config:
      logic-delete-field: is_deleted       # 逻辑删除字段名（数据库里的）
      logic-not-delete-value: 0            # 未删除 = 0 自动在插入时填充 0
      logic-delete-value: 1                # 已删除 = 1

  configuration:
    # 开启下划线转驼峰命名
    # 数据库字段：role_key
    # Java属性：roleKey
    map-underscore-to-camel-case: true
    # MyBatis-Plus SQL 日志输出：使用 SLF4J（统一走我们的 logging 配置）
    log-impl: org.apache.ibatis.logging.slf4j.Slf4jImpl

# 日志配置
logging:
  level:
    # ==========================================
    # 重点关注：我们需要的日志
    # ==========================================
    # MyBatis-Plus SQL 日志（只看这个就行）
    com.melioes.blueprintdigitalnexus.mapper: debug
    # Spring Cache 缓存日志
    org.springframework.cache: debug
    # Redis 操作日志
    org.springframework.data.redis: debug
    # 我们自己的业务日志
    com.melioes.blueprintdigitalnexus: info
    # ==========================================
    # 过滤掉：无关的噪声日志
    # ==========================================
    # Spring Security（只看错误）
    org.springframework.security: error
    # HikariCP 连接池
    com.zaxxer.hikari: warn
    # Tomcat
    org.apache.tomcat: warn
    # Spring 框架通用
    org.springframework: warn
    # MyBatis 其他
    org.apache.ibatis: warn
  pattern:
    # 日志格式优化：更简洁，带颜色（如果控制台支持）
    console: "%d{HH:mm:ss} [%thread] %highlight(%-5level) %logger{36} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"


jwt:
  secret-key: ${JWT_SECRET}
  ttl: 86400000
  token-name: token

knife4j:
  enable: true
  setting:
    language: zh_cn
    enable-swagger-models: true
  production: false
  # 分组配置
  basic:
    enable: false  # 是否开启认证（生产环境建议开启）

# HTTP 端口配置（用于调试）
http:
  port: 8080
